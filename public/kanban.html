<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban — MahattaART Tasks</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="sidebar"></div>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>Kanban Board</h2>
        <p class="text-muted" id="boardSubtitle">All projects</p>
      </div>
      <div class="header-actions">
        <select id="projectFilter" class="input-sm">
          <option value="">All Projects</option>
        </select>
        <button class="btn btn-primary" onclick="openTaskModal()">+ New Task</button>
      </div>
    </div>

    <div id="kanbanBoard" class="kanban-board">
      <!-- columns rendered by JS -->
    </div>
  </main>

  <!-- TASK DETAIL / QUICK-EDIT DRAWER -->
  <div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
  <div id="taskDrawer" class="task-drawer">
    <div class="drawer-header">
      <span id="drawerTaskId" class="badge-taskid"></span>
      <button class="btn-icon" onclick="closeDrawer()">✕</button>
    </div>
    <div id="drawerBody" class="drawer-body"></div>
  </div>

  <!-- CREATE / EDIT MODAL -->
  <div id="modalOverlay" class="modal-overlay" onclick="closeTaskModal()"></div>
  <div id="taskModal" class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">New Task</h3>
      <button class="btn-icon" onclick="closeTaskModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>

  <script src="app.js"></script>
  <script>
    requireAuth();
    renderSidebar('kanban');

    const COLS = [
      { status: 'todo',        label: 'To Do',       color: '#94a3b8' },
      { status: 'in_progress', label: 'In Progress',  color: '#3b82f6' },
      { status: 'testing',     label: 'Testing',      color: '#f59e0b' },
      { status: 'completed',   label: 'Completed',    color: '#22c55e' },
      { status: 'on_hold',     label: 'On Hold',      color: '#a855f7' },
      { status: 'cancelled',   label: 'Cancelled',    color: '#ef4444' },
    ];

    const PRIO_BADGE = { critical:'badge-critical', high:'badge-high', medium:'badge-medium', low:'badge-low' };
    let currentProject = '';

    async function loadKanban() {
      const qs = currentProject ? `?project=${encodeURIComponent(currentProject)}` : '';
      const data = await api('/api/admin/tasks/kanban' + qs);
      if (!data.success) return;

      // Populate project filter once
      if (document.getElementById('projectFilter').options.length === 1) {
        const all = await api('/api/admin/tasks?limit=500');
        if (all.success) {
          const projects = [...new Set(all.data.map(t => t.project).filter(Boolean))];
          projects.forEach(p => {
            const o = document.createElement('option');
            o.value = p; o.textContent = p;
            document.getElementById('projectFilter').appendChild(o);
          });
        }
      }

      const board = document.getElementById('kanbanBoard');
      board.innerHTML = '';

      data.data.forEach(col => {
        const colDef = COLS.find(c => c.status === col.status) || { color: '#999', label: col.label };
        const colEl = document.createElement('div');
        colEl.className = 'kanban-col';
        colEl.innerHTML = `
          <div class="kanban-col-header" style="border-top:3px solid ${colDef.color}">
            <span class="col-label">${col.label}</span>
            <span class="col-count">${col.count}</span>
          </div>
          <div class="kanban-cards" id="col-${col.status}">
            ${col.tasks.length === 0
              ? `<div class="kanban-empty">No tasks</div>`
              : col.tasks.map(t => taskCard(t)).join('')}
          </div>
        `;
        board.appendChild(colEl);
      });
    }

    function taskCard(t) {
      const due = t.dueDate ? new Date(t.dueDate) : null;
      const overdue = due && due < new Date() && !['completed','cancelled'].includes(t.status);
      const dueFmt  = due ? due.toLocaleDateString('en-IN', { day:'numeric', month:'short' }) : '';
      const assignees = (t.assignedTo || []).map(a => avatar(a.name)).join('');

      return `
        <div class="kanban-card" onclick="openDrawer('${t._id}')">
          <div class="card-top">
            <span class="badge ${PRIO_BADGE[t.priority] || ''}">${t.priority}</span>
            <span class="card-taskid">${t.taskId}</span>
          </div>
          <div class="card-title">${t.title}</div>
          ${t.tags && t.tags.length ? `<div class="card-tags">${t.tags.map(g=>`<span class="tag">${g}</span>`).join('')}</div>` : ''}
          <div class="card-footer">
            <div class="card-avatars">${assignees}</div>
            ${due ? `<span class="card-due ${overdue ? 'overdue' : ''}">📅 ${dueFmt}</span>` : ''}
          </div>
          ${t.comments && t.comments.length ? `<div class="card-meta">💬 ${t.comments.length}</div>` : ''}
        </div>`;
    }

    function avatar(name) {
      const initials = (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
      const colors = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#ef4444','#06b6d4'];
      const color  = colors[initials.charCodeAt(0) % colors.length];
      return `<span class="avatar" style="background:${color}" title="${name}">${initials}</span>`;
    }

    /* ── Drawer ── */
    async function openDrawer(id) {
      const data = await api('/api/admin/tasks/' + id);
      if (!data.success) return;
      const t = data.data;

      document.getElementById('drawerTaskId').textContent = t.taskId;
      document.getElementById('drawerOverlay').classList.add('open');
      document.getElementById('taskDrawer').classList.add('open');

      const due = t.dueDate ? new Date(t.dueDate).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '—';
      const assigneeNames = (t.assignedTo || []).map(a => a.name).join(', ') || '—';

      document.getElementById('drawerBody').innerHTML = `
        <h2 style="margin:0 0 12px">${t.title}</h2>
        <div class="drawer-meta-grid">
          <span class="dm-label">Status</span>  <span class="badge badge-${t.status}">${t.status.replace('_',' ')}</span>
          <span class="dm-label">Priority</span><span class="badge ${PRIO_BADGE[t.priority]}">${t.priority}</span>
          <span class="dm-label">Project</span> <span>${t.project}</span>
          <span class="dm-label">Assigned</span><span>${assigneeNames}</span>
          <span class="dm-label">Due</span>     <span>${due}</span>
          ${t.estimatedHours ? `<span class="dm-label">Est.</span><span>${t.estimatedHours}h</span>` : ''}
        </div>
        ${t.description ? `<p style="margin-top:16px;color:#555">${t.description}</p>` : ''}
        ${t.tags && t.tags.length ? `<div class="card-tags" style="margin-top:12px">${t.tags.map(g=>`<span class="tag">${g}</span>`).join('')}</div>` : ''}

        <div class="drawer-section">
          <div class="drawer-section-title">Change Status</div>
          <div class="status-btns">
            ${['todo','in_progress','testing','completed','on_hold','cancelled'].map(s =>
              `<button class="btn-status ${t.status===s?'active':''}" onclick="changeStatus('${t._id}','${s}')">${s.replace('_',' ')}</button>`
            ).join('')}
          </div>
        </div>

        <div class="drawer-section">
          <div class="drawer-section-title">Comments (${t.comments.length})</div>
          <div id="commentList">
            ${t.comments.length
              ? t.comments.map(c => `
                  <div class="comment">
                    ${avatar(c.authorName)}
                    <div class="comment-body">
                      <span class="comment-author">${c.authorName}</span>
                      <span class="comment-time">${new Date(c.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>
                      <p>${c.text}</p>
                    </div>
                  </div>`).join('')
              : '<p class="text-muted">No comments yet.</p>'}
          </div>
          <div class="comment-box">
            <textarea id="newComment" placeholder="Add a comment…" rows="2"></textarea>
            <button class="btn btn-primary btn-sm" onclick="postComment('${t._id}')">Post</button>
          </div>
        </div>

        <div style="margin-top:16px;display:flex;gap:8px">
          <button class="btn btn-secondary" onclick="closeDrawer();openTaskModal('${t._id}')">Edit Task</button>
        </div>
      `;
    }

    async function changeStatus(id, status) {
      await api('/api/admin/tasks/' + id + '/status', 'PATCH', { status });
      closeDrawer();
      loadKanban();
    }

    async function postComment(id) {
      const text = document.getElementById('newComment').value.trim();
      if (!text) return;
      await api('/api/admin/tasks/' + id + '/comments', 'POST', { text });
      openDrawer(id);
    }

    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('open');
      document.getElementById('taskDrawer').classList.remove('open');
    }

    /* ── Create/Edit Modal ── */
    function openTaskModal(id) {
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('taskModal').classList.add('open');
      renderTaskForm(id);
    }
    function closeTaskModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('taskModal').classList.remove('open');
    }

    async function renderTaskForm(id) {
      let task = null;
      if (id) {
        const d = await api('/api/admin/tasks/' + id);
        if (d.success) task = d.data;
      }
      document.getElementById('modalTitle').textContent = task ? 'Edit Task' : 'New Task';
      document.getElementById('modalBody').innerHTML = taskFormHTML(task);
    }

    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeTaskModal();
    });

    /* project filter */
    document.getElementById('projectFilter').addEventListener('change', e => {
      currentProject = e.target.value;
      document.getElementById('boardSubtitle').textContent = currentProject || 'All projects';
      loadKanban();
    });

    loadKanban();
  </script>
  <script src="taskform.js"></script>
</body>
</html>
